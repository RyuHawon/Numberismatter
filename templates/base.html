<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Number is Matter</title>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <span>{{ user.nickname }}님</span>
                <a href="{% url 'accounts:profile_edit' %}">회원정보 수정</a>
                <a href="{% url 'accounts:password_change' %}">비밀번호 변경</a>
                <a href="{% url 'accounts:account_delete' %}">회원 탈퇴</a>
            <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button type="submit">로그아웃</button>
            </form>
        {% else %}
            <a href="{% url 'accounts:login' %}">로그인</a>
            <a href="{% url 'accounts:signup' %}">회원가입</a>
        {% endif %}
    </nav>
    <hr>
    {% block content %}{% endblock content %}
</body>
</html>
