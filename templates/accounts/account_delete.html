{% extends "base.html" %}

{% block content %}
<div class="card auth-card" style="text-align:center;">
    <h1 class="page-title">정말 탈퇴하시겠습니까?</h1>
    <p style="color:var(--text-dim); margin-bottom:22px;">탈퇴하면 계정이 비활성화됩니다.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" style="width:100%;">탈퇴하기</button>
    </form>
    <a href="{% url 'game:home' %}" class="auth-link">취소</a>
</div>
{% endblock content %}
