{% extends "base.html" %}

{% block content %}
<div class="card auth-card">
    <h1 class="page-title">로그인</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width:100%;">로그인</button>
    </form>
    <a href="{% url 'accounts:signup' %}" class="auth-link">계정이 없으신가요? 회원가입 →</a>
</div>
{% endblock content %}
