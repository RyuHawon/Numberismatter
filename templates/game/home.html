{% extends "base.html" %}

{% block title %}Number is Matter{% endblock  %}

{% block content %}
<h1>Number is Matter</h1>

{% if user.is_authenticated %}
    <p>{{user.nickname}}님, 환영합니다.</p>
    <button>게임 시작</button>
{% else %}
    <p>로그인하고 게임을 시작하세요.</p>
    <a href="{% url 'accounts:login' %}">로그인</a>
    <a href="{% url 'accounts:signup' %}">회원가입</a>
{% endif %}
{% endblock %}
