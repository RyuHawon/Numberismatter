services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: >
      uv run gunicorn numberismatter.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 60
      --graceful-timeout 30
      --worker-tmp-dir /dev/shm
      --access-logfile -
      --error-logfile -
    ports:
      - "80:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
