services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: numberismatter
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameuser -d numberismatter"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: uv run gunicorn numberismatter.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: local-compose-test-key-not-secret
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://gameuser:gamepassword@db:5432/numberismatter
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: